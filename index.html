<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién es el más vacán? - IA</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Arial Black', sans-serif; 
            background: linear-gradient(-45deg, #74b9ff, #a29bfe, #81ecec, #fab1a0);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .vaca-img { 
            width: 150px; 
            display: block; 
            margin: 0 auto 10px auto; 
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 { 
            font-style: italic; 
            font-size: 1.8rem; 
            margin: 10px 0; 
            color: #1a1a1a;
            text-align: center;
        }

        .preg-tag { 
            background-color: #5da2d5; 
            color: white; 
            padding: 8px 25px; 
            border-radius: 25px; 
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        .card { 
            background: white;
            width: 100%; 
            max-width: 400px; 
            border-radius: 20px; 
            padding: 30px 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            text-align: center;
        }

        .tipo-pregunta { 
            background-color: #d65a6d; 
            color: white; 
            padding: 5px 15px; 
            border-radius: 15px; 
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        #texto-pregunta { 
            font-size: 1.2rem; 
            color: #333; 
            margin: 20px 0;
            line-height: 1.4;
        }

        .btn-revelar { 
            background-color: #d65a6d; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            width: 100%; 
            cursor: pointer; 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .btn-revelar:active { transform: scale(0.98); }

        #respuesta { 
            margin-top: 15px; 
            font-weight: bold; 
            font-size: 1.2rem; 
            display: none; 
        }

        #respuesta.verdadero {
            color: #2ecc71;
        }

        #respuesta.falso {
            color: #e74c3c;
        }

        .btn-siguiente { 
            background-color: #5da2d5; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            margin-top: 15px; 
            width: 100%; 
            cursor: pointer;
            display: none;
        }

        /* Pantalla de inicio */
        #pantallaInicio {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #pantallaJuego {
            display: none;
        }

        .form-grupo {
            margin: 15px 0;
        }

        .form-grupo label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #1a1a1a;
            font-weight: bold;
        }

        .form-grupo input,
        .form-grupo select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #5da2d5;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .form-grupo input:focus,
        .form-grupo select:focus {
            outline: none;
            border-color: #d65a6d;
            box-shadow: 0 0 5px rgba(214, 90, 109, 0.5);
        }

        .btn-iniciar {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
            transition: background-color 0.3s;
        }

        .btn-iniciar:hover {
            background-color: #27ae60;
        }

        .btn-iniciar:active {
            transform: scale(0.98);
        }

        .cargando {
            text-align: center;
            color: #1a1a1a;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d65a6d;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .nota-api {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .nota-api a {
            color: #0066cc;
            text-decoration: none;
        }

        .nota-api a:hover {
            text-decoration: underline;
        }

        .badge-gratis {
            background-color: #d4edda;
            color: #155724;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <img src="VACAN_2.png" alt="La Vaca" class="vaca-img" onerror="this.style.display='none'"> 

    <!-- Pantalla de Inicio -->
    <div id="pantallaInicio" class="card">
        <h1>¿QUIÉN ES EL MÁS VACÁN?</h1>
        <p style="font-size: 1.1rem; color: #666; margin: 20px 0;">Modo IA - Preguntas Dinámicas</p>
        <div class="badge-gratis">✨ Gratis e Ilimitado con Gemini</div>

        <form id="formInicio">
            <div class="form-grupo">
                <label for="tema">Tema de Preguntas:</label>
                <input 
                    type="text" 
                    id="tema" 
                    placeholder="ej: Biología, Historia, Astronomía..." 
                    required
                >
            </div>

            <div class="form-grupo">
                <label for="cantidad">Cantidad de Preguntas:</label>
                <select id="cantidad" required>
                    <option value="5">5 preguntas</option>
                    <option value="10" selected>10 preguntas</option>
                    <option value="15">15 preguntas</option>
                    <option value="20">20 preguntas</option>
                </select>
            </div>

            <div class="form-grupo">
                <label for="apiKey">API Key de Google Gemini:</label>
                <input 
                    type="password" 
                    id="apiKey" 
                    placeholder="AIza..." 
                    required
                >
            </div>

            <div class="nota-api">
                ℹ️ <strong>Obtén tu API Key GRATIS en:</strong><br>
                <a href="https://aistudio.google.com/apikey" target="_blank">🔗 Google AI Studio</a><br>
                <small>¡Sin límite de uso! Solo necesitas una cuenta Google</small>
            </div>

            <button type="submit" class="btn-iniciar">🚀 INICIAR JUEGO</button>
        </form>
    </div>

    <!-- Pantalla de Juego -->
    <div id="pantallaJuego">
        <h1>¿QUIÉN ES EL MÁS VACÁN?</h1>

        <div id="contador" class="preg-tag">PREGUNTA #1</div>

        <div class="card">
            <div class="tipo-pregunta">¿VERDADERO O FALSO?</div>
            <div id="cargandoPregunta" class="cargando" style="display:none;">
                <p>Generando pregunta...</p>
                <div class="spinner"></div>
            </div>
            <p id="texto-pregunta">Cargando...</p>
            
            <button id="btn-revelar" class="btn-revelar" onclick="revelar()" style="display:none;">
                🔍 REVELAR RESPUESTA
            </button>
            
            <div id="respuesta"></div>
            
            <button id="btn-siguiente" class="btn-siguiente" onclick="siguiente()">
                SIGUIENTE PREGUNTA ➔
            </button>
        </div>
    </div>

<script>
    let mazo = [];
    let actual = 0;
    let num = 1;
    let tema = '';
    let apiKey = '';

    // Manejar envío del formulario
    document.getElementById('formInicio').addEventListener('submit', async (e) => {
        e.preventDefault();
        tema = document.getElementById('tema').value;
        const cantidad = document.getElementById('cantidad').value;
        apiKey = document.getElementById('apiKey').value;

        // Ocultar formulario y mostrar pantalla de juego
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('pantallaJuego').style.display = 'block';

        // Generar preguntas con IA
        await generarPreguntasConGemini(tema, cantidad, apiKey);
        sacarPregunta();
    });

    async function generarPreguntasConGemini(tema, cantidad, apiKey) {
        const prompt = `Genera exactamente ${cantidad} preguntas de verdadero o falso sobre "${tema}". 

IMPORTANTE: Devuelve SOLO un JSON válido en este formato exacto (sin markdown, sin comentarios):
[
  {"q": "pregunta 1", "a": "VERDADERO. explicación", "tipo": "verdadero"},
  {"q": "pregunta 2", "a": "FALSO. explicación", "tipo": "falso"}
]

Requisitos:
- Las preguntas deben ser afirmaciones sin signos de interrogación
- Alterna entre verdadero y falso
- Las respuestas deben empezar con "VERDADERO" o "FALSO"
- Incluye una explicación breve después del tipo
- Devuelve SOLO el JSON array, nada más`;

        try {
            document.getElementById('cargandoPregunta').style.display = 'block';
            document.getElementById('texto-pregunta').innerText = 'Cargando...';

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    contents: [
                        {
                            parts: [
                                {
                                    text: prompt
                                }
                            ]
                        }
                    ],
                    generationConfig: {
                        temperature: 0.7,
                        maxOutputTokens: 2048,
                    }
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'Error en la API de Gemini');
            }

            const data = await response.json();
            
            if (!data.candidates || !data.candidates[0]) {
                throw new Error('No se recibió respuesta de Gemini');
            }

            const contenido = data.candidates[0].content.parts[0].text;

            // Extraer JSON del contenido
            const jsonMatch = contenido.match(/\[[\s\S]*\]/);
            if (!jsonMatch) {
                throw new Error('No se pudo extraer el JSON de la respuesta');
            }

            mazo = JSON.parse(jsonMatch[0]);
            document.getElementById('cargandoPregunta').style.display = 'none';

        } catch (error) {
            document.getElementById('cargandoPregunta').style.display = 'none';
            alert('Error al generar preguntas: ' + error.message);
            // Volver a la pantalla de inicio
            document.getElementById('pantallaInicio').style.display = 'flex';
            document.getElementById('pantallaJuego').style.display = 'none';
        }
    }

    function sacarPregunta() {
        if (mazo.length === 0) {
            document.getElementById('texto-pregunta').innerHTML = "¡Felicidades!<br>Eres el más Vacán 🔥🐮";
            document.getElementById('btn-revelar').style.display = 'none';
            document.getElementById('contador').innerText = "¡VICTORIA!";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            return;
        }
        actual = Math.floor(Math.random() * mazo.length);
        document.getElementById('texto-pregunta').innerText = mazo[actual].q;
        document.getElementById('contador').innerText = "PREGUNTA #" + num;
        document.getElementById('respuesta').style.display = 'none';
        document.getElementById('respuesta').className = '';
        document.getElementById('btn-siguiente').style.display = 'none';
        document.getElementById('btn-revelar').style.display = 'flex';
    }

    function revelar() {
        const respDiv = document.getElementById('respuesta');
        respDiv.innerText = mazo[actual].a;
        respDiv.className = mazo[actual].tipo;
        respDiv.style.display = 'block';
        document.getElementById('btn-revelar').style.display = 'none';
        document.getElementById('btn-siguiente').style.display = 'block';
    }

    function siguiente() {
        mazo.splice(actual, 1); 
        num++;
        sacarPregunta();
    }
</script>

</body>
</html>
